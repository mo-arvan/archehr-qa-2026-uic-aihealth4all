hydra:
  run:
    dir: outputs/2026-selected/gpt-5.1-answer-first-v4-high-k3
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=outputs/2026-selected/gpt-5.1-answer-first-v4-high-k3
    - hydra.mode=RUN
    task:
    - dataset=archehr-dev
    - method=answer_first
    - method.evidence_prompt_file_path=prompts/evidence-classification-answer-first-v4.txt
    - method.qa_prompt_file_path=prompts/answer-generation-answer-first-v4.txt
    - method.k_candidates=3
    - model=gpt-5.1
    - model.reasoning_effort=high
  job:
    name: benchmark
    chdir: null
    override_dirname: dataset=archehr-dev,method.evidence_prompt_file_path=prompts/evidence-classification-answer-first-v4.txt,method.k_candidates=3,method.qa_prompt_file_path=prompts/answer-generation-answer-first-v4.txt,method=answer_first,model.reasoning_effort=high,model=gpt-5.1
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /app
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /app/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /app/outputs/2026-selected/gpt-5.1-answer-first-v4-high-k3
    choices:
      model: gpt-5.1
      method: answer_first
      dataset: archehr-dev
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
